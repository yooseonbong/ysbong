<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=Edge" />
<meta name="viewport" content="initial-scale=1.0,maximum-scale=1,width=device-width">
<title>자치법규 관리자</title>
<script src="./js/jquery-3.6.0.min.js"></script>
<script src="./js/jquery-ui.min.js"></script>
<script src="./js/datepicker-ko.js"></script>
<script src="./js/bootstrap.min.js"></script>
<script src="./js/layout.js"></script>

<link rel="stylesheet" href="./css/jquery-ui.min.css">
<link rel="stylesheet" href="./css/bootstrap.css">
<link rel="stylesheet" href="./css/fonts.css">
<link rel="stylesheet" href="./css/common.css">
<link rel="stylesheet" href="./css/layout.css">

</head>
<body>
<div id="wrap">
	<div id="login">
		<h1>관리자 로그인</h1>
		<form id="logIDPW" name="logIDPW" target="_self" action="login.html" method="POST">
			<fieldset class="login_form">
				<legend>관리자 로그인</legend>
				<div class="input_area">
					<p>
						<label for="id">아이디</label>
						<input type="text" id="id" name="id" placeholder="아이디" title="아이디 입력">
					</p>
					<p>
						<label for="pw">비밀번호</label>
						<input type="password" id="pw" name="pw" placeholder="비밀번호" title="비밀번호 입력">
					</p>
				</div>
				<div class="check_info">
					<input type="checkbox" id="login_chk" name="nvlong" class="" value="off">
					<label for="login_chk" id="label_login_chk" class="ico_keep_check ">아이디 저장</label>
				</div>
				<div class="login_btn">
					<a href="#" class="log_btn">로그인</a>
					<a href="#" class="cancle_btn">취소</a>
				</div>
				
			</fieldset>
		</form>
	</div>
</div>
</body>
</html>
