<!DOCTYPE html>
<html lang="ko">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<title>철도경찰형사사법업무시스템</title>
<script src="./js/jquery-1.12.4.js"></script>
<script src="./js/jquery-ui.min.js"></script>
<script src="./js/datepicker-ko.js"></script>
<script src="./js/layout.js"></script>
<link rel="stylesheet" type="text/css" href="./css/common.css">
<link rel="stylesheet" type="text/css" href="./css/layout.css">
<link rel="stylesheet" type="text/css" href="./css/jquery-ui.min.css">
</head>
<body>
	<div id="wrap">
		<div id="login">
			<h1><img src="images/log_logo.png" alt="철도경찰형사사법업무시스템"></h1>
			<div class="log_article">
				<h2><span>로그인</span></h2>
				<p>철도경찰형사사법업무시스템입니다.</p>
				<form id="logIDPW" name="logIDPW" target="_self" action="login.html" method="POST">
					<fieldset class="login_form">
						<legend>로그인</legend>
						<div class="input_area">
							<p>
								<label for="id" >아이디</label>
								<input type="text" id="id" name="id" placeholder="아이디" value="" title="아이디 입력">
							</p>
							<p>
								<label for="pw" i>비밀번호</label>
								<input type="password" id="pw" name="pw" placeholder="비밀번호" title="비밀번호 입력">
							</p>
						</div>
						<div class="check_info">
							<input type="checkbox" id="login_chk" name="nvlong" class="" value="off">
							<label for="login_chk" id="label_login_chk" class="ico_keep_check ">아이디 저장</label>
						</div>
						<input type="submit" title="로그인 하기" alt="로그인" value="로그인" class="log_btn">
					</fieldset>
				</form>
			</div><!-- log_article -->
		</div><!-- login -->
	</div>
</body>
</html>
