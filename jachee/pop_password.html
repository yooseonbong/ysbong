<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=Edge" />
<meta name="viewport" content="initial-scale=1.0,maximum-scale=1,width=device-width">
<title>자치법규 관리자 팝업</title>
<script src="./js/jquery-3.6.0.min.js"></script>
<script src="./js/jquery-ui.min.js"></script>
<script src="./js/datepicker-ko.js"></script>
<script src="./js/bootstrap.min.js"></script>
<script src="./js/layout.js"></script>

<link rel="stylesheet" href="./css/jquery-ui.min.css">
<link rel="stylesheet" href="./css/bootstrap.css">
<link rel="stylesheet" href="./css/fonts.css">
<link rel="stylesheet" href="./css/common.css">
<link rel="stylesheet" href="./css/layout.css">

</head>
<body>
<div id="pop_wrap">
	<div id="header" class="header">
		<h1><a href="#">비밀번호변경(관리자, 팝업)</a></h1>
		<button class="btn_pop_close" onClick="window.close()">닫기</button>
	</div>
	<div id="pop_cont">
		<div class="bbs_write">
			<table>
				<caption>"용자 상세정보 조회" 의 내용입니다.</caption>
				<colgroup>
					<col style="width:30%;">
					<col>
				</colgroup>
				<tbody>
					<tr>
						<th scope="row"><label for="id">사용자아이디</label></th>
						<td><input type="text" id="id" name="id" class="w100per" title="사용자아이디 입력"></td>
					</tr>
					<tr>
						<th scope="row"><label for="password1">비밀번호</label></th>
						<td>
							<input type="password" id="password1" name="password1" class="w100per" title="비밀번호 입력">
							<p class="info_txt blue">* 8~16자 영문 대 소문자, 숫자, 특수문자를 사용하세요.</p>
							<span class="info_txt blue blod">* 8~16자 영문 대 소문자, 숫자, 특수문자를 사용하세요.</span>
							<p class="info_txt red">* 8~16자 영문 대 소문자, 숫자, 특수문자를 사용하세요.</p>
							<p class="info_txt red blod">* 8~16자 영문 대 소문자, 숫자, 특수문자를 사용하세요.</p>
							
						</td>
					</tr>
					<tr>
						<th scope="row"><label for="password2">비밀번호 확인</label></th>
						<td>
							<input type="password" id="password2" name="password2" class="w100per" title="비밀번호 확인 입력">
							<p class="info_txt blue">* 비밀번호가 일치하지 않습니다.</p>
						</td>
					</tr>
				</tbody>
			</table>
		</div>
		<div class="btn_box">
			<a href="#" class="btn btn_navy">수정</a>
			<a href="#" class="btn btn_white" onClick="window.close()">닫기</a>
			
		</div>
	</div>
	
</div>
</body>
</html>
